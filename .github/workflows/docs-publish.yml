name: Publish API Documentation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docs:
    name: Build Rust API Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Z3
        uses: z3prover/setup-z3@v1
        with:
          z3-version: 4.12.2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Build documentation
        run: cargo doc --workspace --no-deps --lib
        env:
          RUSTDOCFLAGS: "--enable-index-page -Zunstable-options"

      - name: Add index redirect
        run: |
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Sanctifier API Documentation</title>
            <meta http-equiv="refresh" content="0; url=sanctifier_core/index.html">
          </head>
          <body>
            <p>Redirecting to <a href="sanctifier_core/index.html">Sanctifier API Documentation</a>...</p>
          </body>
          </html>
          EOF

      - name: Add .nojekyll file
        run: touch target/doc/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
